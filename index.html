<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexa NWX — Constructor de chatbots</title>
<style>
:root {
  --bg: #0f1117;
  --bg-side: #181b24;
  --bg-card: #1d2030;
  --bg-card-2: #252a3d;
  --bg-soft: #2a2f44;
  --bg-hover: #303652;
  --text: #ffffff;
  --text-s: #b0b6c8;
  --text-m: #7a82a0;
  --text-l: #5a6383;
  --border: #2a2f44;
  --border-s: #3a4060;
  --accent: #7c3aed;
  --accent-h: #6d28d9;
  --accent-l: #2a1a4d;
  --accent-2: #ec4899;
  --success: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;
  --r: 8px;
  --r-l: 14px;
  --shadow: 0 4px 16px rgba(0,0,0,.4);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  color: var(--text);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; }
input, select, textarea { font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }

/* === App layout === */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  height: 100vh;
}

/* === Sidebar === */
aside.side {
  background: var(--bg-side);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 16px;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -.3px;
  border-bottom: 1px solid var(--border);
}
.brand .mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 4px 12px rgba(124,58,237,.4);
}
.side-nav {
  padding: 12px 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px;
  border-radius: 6px;
  color: var(--text-s);
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 1px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-l); color: var(--accent); font-weight: 600; }
.nav-item .ico { width: 18px; height: 18px; display: flex; flex-shrink: 0; }
.nav-item .count {
  margin-left: auto;
  background: var(--bg-soft);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
}
.side-section {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-l);
  padding: 16px 16px 6px;
}
.side-foot {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-m);
}

/* === Main === */
main {
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
.page-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.page-head h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.page-head .sub { color: var(--text-m); font-size: 13px; margin-top: 2px; }
.page-head .actions { display: flex; gap: 8px; align-items: center; }

.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
}

/* === Buttons === */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  height: 36px;
  padding: 0 14px;
  border-radius: var(--r);
  border: 1px solid transparent;
  background: var(--accent);
  color: white;
  font-weight: 600;
  font-size: 13px;
  transition: background .12s, transform .05s;
}
.btn:hover { background: var(--accent-h); }
.btn:active { transform: translateY(1px); }
.btn.ghost { background: var(--bg-card); color: var(--text); border-color: var(--border-s); }
.btn.ghost:hover { background: var(--bg-soft); }
.btn.danger { background: var(--danger); }
.btn.success { background: var(--success); }
.btn.sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn.lg { height: 42px; padding: 0 18px; font-size: 14px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* === Cards === */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  margin-bottom: 16px;
}
.card-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
.card-body { padding: 18px; }
.card-body.flush { padding: 0; }

/* === Bot list === */
.bot-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.bot-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 20px;
  cursor: pointer;
  transition: transform .15s, border-color .15s, box-shadow .15s;
  position: relative;
}
.bot-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 12px 32px -8px rgba(124,58,237,.3);
}
.bot-card .icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin-bottom: 14px;
}
.bot-card h3 { margin: 0 0 4px; font-size: 16px; }
.bot-card .meta { color: var(--text-m); font-size: 12px; margin-bottom: 12px; }
.bot-card .stats {
  display: flex; gap: 16px;
  font-size: 12px;
  color: var(--text-s);
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.bot-card .stats b { color: var(--text); }
.bot-card .status-tag {
  position: absolute;
  top: 16px; right: 16px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .3px;
}
.bot-card .status-tag.active { background: rgba(16,185,129,.15); color: var(--success); }
.bot-card .status-tag.draft { background: var(--bg-soft); color: var(--text-m); }

/* === Editor layout === */
.editor {
  display: grid;
  grid-template-columns: 1fr 380px;
  flex: 1;
  overflow: hidden;
}
.editor-canvas {
  overflow-y: auto;
  padding: 28px 32px 80px;
  background:
    radial-gradient(circle, rgba(124,58,237,.06) 1px, transparent 1px) 0 0/24px 24px,
    var(--bg);
}
.editor-side {
  background: var(--bg-side);
  border-left: 1px solid var(--border);
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* === Flow nodes === */
.flow-start, .flow-end-node {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  border-radius: 999px;
  font-weight: 600; font-size: 13px;
  margin: 0 auto;
}
.flow-start { background: var(--accent); color: white; }
.flow-end-node { background: var(--success); color: white; }
.flow-arrow {
  display: flex; justify-content: center;
  color: var(--border-s);
  font-size: 20px;
  margin: 4px 0;
}
.flow-container {
  max-width: 640px; margin: 0 auto;
  display: flex; flex-direction: column;
}

.node {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  position: relative;
}
.node:hover { border-color: var(--accent); box-shadow: 0 8px 24px -8px rgba(124,58,237,.3); }
.node.selected { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-l); }
.node-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--bg-card-2);
  border-bottom: 1px solid var(--border);
}
.node-head .type-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: white;
}
.node-head .type-label {
  font-weight: 600; font-size: 12px;
  text-transform: uppercase; letter-spacing: .4px;
  color: var(--text-s);
}
.node-head .id {
  margin-left: auto;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--text-l);
}
.node-head .del-btn {
  background: none; border: none;
  width: 24px; height: 24px;
  border-radius: 4px;
  color: var(--text-l);
}
.node-head .del-btn:hover { background: var(--danger); color: white; }

.node-body { padding: 14px 16px; }
.node-body .content-preview {
  color: var(--text);
  white-space: pre-wrap;
  word-wrap: break-word;
  line-height: 1.5;
}
.node-body .placeholder {
  color: var(--text-l);
  font-style: italic;
}
.node-body .branches {
  display: flex; flex-direction: column; gap: 6px;
  margin-top: 10px;
}
.node-body .branch {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-soft);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
}
.node-body .branch .label { flex: 1; }
.node-body .branch .target {
  color: var(--text-m);
  font-size: 12px;
}
.node-body .variable {
  display: inline-block;
  background: var(--accent-l);
  color: var(--accent);
  padding: 1px 8px;
  border-radius: 4px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  margin-top: 6px;
}

/* Node type colors */
.tcolor-message { background: var(--info); }
.tcolor-question { background: #8b5cf6; }
.tcolor-buttons { background: var(--accent); }
.tcolor-condition { background: var(--warn); }
.tcolor-action { background: #ec4899; }
.tcolor-delay { background: #06b6d4; }
.tcolor-end { background: var(--success); }

.add-step-btn {
  background: var(--bg-card);
  border: 2px dashed var(--border-s);
  color: var(--text-m);
  border-radius: var(--r-l);
  padding: 14px;
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all .15s;
  margin-top: 4px;
}
.add-step-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-card-2); }

/* === Editor side: preview/inspector === */
.side-tabs {
  display: flex;
  background: var(--bg-side);
  border-bottom: 1px solid var(--border);
}
.side-tab {
  flex: 1;
  background: none; border: none;
  padding: 12px;
  font-size: 13px; font-weight: 600;
  color: var(--text-m);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.side-tab:hover { color: var(--text); }
.side-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.side-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* === Chat preview === */
.chat-preview {
  display: flex; flex-direction: column;
  height: 100%;
}
.chat-header {
  background: var(--bg-card);
  border-radius: 12px 12px 0 0;
  padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border);
  border-bottom: none;
}
.chat-header .avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.chat-header .info b { font-size: 14px; }
.chat-header .info .stat { font-size: 11px; color: var(--success); display: flex; align-items: center; gap: 4px; }
.chat-header .info .stat::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
.chat-body {
  flex: 1;
  background: #0a0d18;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 14px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 320px;
  max-height: 50vh;
}
.chat-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 10px 12px;
  display: flex; gap: 8px;
  align-items: center;
}
.chat-input input {
  flex: 1; height: 36px;
  background: var(--bg-soft); color: var(--text);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 0 14px;
  outline: none;
}
.chat-input input:focus { border-color: var(--accent); }
.chat-input button.send {
  background: var(--accent); color: white;
  border: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.msg {
  max-width: 80%;
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.45;
  white-space: pre-wrap;
}
.msg.bot {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-m);
  font-size: 11px;
  font-style: italic;
}
.msg-buttons {
  align-self: flex-start;
  display: flex; flex-direction: column; gap: 6px;
  margin-top: 4px;
}
.msg-btn {
  background: var(--bg-card);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 16px;
  padding: 6px 14px;
  font-size: 13px; font-weight: 600;
  text-align: left;
}
.msg-btn:hover { background: var(--accent-l); }
.msg-btn:disabled { opacity: .5; cursor: not-allowed; }
.msg.bot .typing {
  display: inline-flex; gap: 3px;
  align-items: center;
}
.msg.bot .typing span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-m);
  animation: blink 1.2s infinite;
}
.msg.bot .typing span:nth-child(2) { animation-delay: .2s; }
.msg.bot .typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%, 60%, 100% { opacity: .3; } 30% { opacity: 1; } }

/* === Form fields === */
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.field label { font-size: 12px; font-weight: 600; color: var(--text-s); }
.field input, .field select, .field textarea {
  height: 38px;
  padding: 0 12px;
  border: 1px solid var(--border-s);
  border-radius: var(--r);
  outline: none;
  background: var(--bg-card);
  color: var(--text);
  transition: border-color .12s, box-shadow .12s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-l);
}
.field textarea { height: auto; min-height: 80px; padding: 10px 12px; resize: vertical; }
.field .hint { font-size: 11px; color: var(--text-m); }

.option-row {
  display: flex; gap: 6px; margin-bottom: 6px;
}
.option-row input { flex: 1; }
.option-row select { width: 130px; flex-shrink: 0; }
.option-row .rm { background: none; border: none; color: var(--text-l); width: 32px; }
.option-row .rm:hover { color: var(--danger); }

/* === Modal === */
.modal {
  position: fixed; inset: 0;
  background: rgba(15,17,23,.85);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
.modal.open { display: flex; }
.modal-card {
  background: var(--bg-card);
  border: 1px solid var(--border-s);
  border-radius: var(--r-l);
  max-width: 520px; width: 100%;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h2 { margin: 0; font-size: 16px; }
.modal-body { padding: 18px 20px; }
.modal-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* === Toast === */
#toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-s);
  color: var(--text);
  padding: 12px 18px;
  border-radius: var(--r);
  font-weight: 500; font-size: 13px;
  opacity: 0; transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 500;
  box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateY(0); }

/* === Empty === */
.empty {
  text-align: center; padding: 80px 24px;
  color: var(--text-m);
}
.empty .emoji { font-size: 56px; margin-bottom: 16px; opacity: .8; }
.empty h2 { margin: 0 0 8px; color: var(--text); font-weight: 700; font-size: 20px; }

/* === Templates === */
.template-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.template-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 18px;
  cursor: pointer;
  transition: transform .15s, border-color .15s;
}
.template-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.template-card .ico {
  font-size: 32px;
  margin-bottom: 8px;
}
.template-card h4 { margin: 0 0 6px; font-size: 14px; }
.template-card p { margin: 0; font-size: 12px; color: var(--text-m); line-height: 1.5; }
.template-card .steps {
  font-size: 11px;
  color: var(--text-l);
  margin-top: 10px;
}

/* === KPIs === */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-l);
  padding: 18px;
}
.kpi .label { font-size: 11px; color: var(--text-m); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.kpi .value { font-size: 26px; font-weight: 700; margin: 6px 0 2px; letter-spacing: -.5px; }
.kpi .trend { font-size: 12px; color: var(--success); }

/* === Toggle === */
.toggle {
  position: relative;
  display: inline-block;
  width: 40px; height: 22px;
}
.toggle input { display: none; }
.toggle .slider {
  position: absolute; inset: 0;
  background: var(--bg-soft);
  border-radius: 22px;
  transition: background .15s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform .15s;
}
.toggle input:checked + .slider { background: var(--accent); }
.toggle input:checked + .slider::before { transform: translateX(18px); }

table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data th {
  text-align: left;
  padding: 10px 14px;
  background: var(--bg-card-2);
  font-size: 11px; font-weight: 700;
  color: var(--text-m);
  text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid var(--border);
}
table.data td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
table.data tr:last-child td { border-bottom: none; }
table.data tr.clickable { cursor: pointer; }
table.data tr.clickable:hover { background: var(--bg-card-2); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  aside.side { display: none; }
  .editor { grid-template-columns: 1fr; }
  .editor-side { display: none; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="modal" id="modal"><div class="modal-card" id="modalCard"></div></div>
<div id="toast"></div>

<script>
(() => {
'use strict';

// ============================================================
// UTILS
// ============================================================
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const uid = () => Math.random().toString(36).slice(2, 8);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = ts => new Intl.DateTimeFormat('es-MX', { dateStyle:'medium', timeStyle:'short' }).format(new Date(ts));
const fmtDay = ts => new Intl.DateTimeFormat('es-MX', { day:'numeric', month:'short' }).format(new Date(ts));

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 2500);
}

// Si subes el frontend a Hostinger y el backend a Render, pega aquí la URL de Render

const REMOTE_API_URL = localStorage.getItem('nexa.apiUrl') || '';
const useAPI = !!REMOTE_API_URL || location.protocol === 'http:' || location.protocol === 'https:';
const apiBase = REMOTE_API_URL || '';
function api(path) { return apiBase + path; }

function mergeDefaults(data) {
  const def = seedDB();
  const merged = { ...def, ...data };
  merged.integrations = { ...def.integrations, ...(data?.integrations || {}) };
  if (data?.integrations?.ai) merged.integrations.ai = { ...def.integrations.ai, ...data.integrations.ai };
  if (data?.integrations?.whatsapp) merged.integrations.whatsapp = { ...def.integrations.whatsapp, ...data.integrations.whatsapp };
  if (data?.integrations?.telegram) merged.integrations.telegram = { ...def.integrations.telegram, ...data.integrations.telegram };
  if (!Array.isArray(merged.bots)) merged.bots = [];
  if (!Array.isArray(merged.conversations)) merged.conversations = [];
  return merged;
}

let db;
async function loadDB() {
  if (useAPI) {
    try {
      const r = await fetch(api('/api/state'));
      if (r.ok) {
        const data = await r.json();
        const merged = mergeDefaults(data);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(merged)); } catch(e) {}
        return merged;
      }
    } catch(e) { console.warn('API unreachable, using localStorage', e); }
  }
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data?.bots)) return mergeDefaults(data);
    }
  } catch(e) {}
  return seedDB();
}
let _saveT = null;
function saveDB() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
  if (useAPI) {
    clearTimeout(_saveT);
    _saveT = setTimeout(() => {
      fetch(api('/api/state'), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(db) }).catch(()=>{});
    }, 200);
  }
}

async function aiChat(messages, systemPrompt) {
  if (!useAPI) {
    return { reply: '(Modo demo: levanta el servidor con start.bat para usar IA real)', demo: true };
  }
  try {
    const r = await fetch(api('/api/ai/chat'), {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ messages, systemPrompt }),
    });
    return await r.json();
  } catch(e) {
    return { reply: '(Error contactando la IA)', error: true };
  }
}

const routes = [];
function route(p, h) {
  const keys = [];
  const re = new RegExp('^' + p.replace(/:[^/]+/g, m => { keys.push(m.slice(1)); return '([^/]+)'; }) + '$');
  routes.push({ keys, re, h });
}
let cur;
function parseHash() {
  const h = location.hash.slice(1) || '/';
  const [path, qs] = h.split('?');
  const q = {};
  if (qs) qs.split('&').forEach(p => { const [k,v] = p.split('='); q[k] = decodeURIComponent(v||''); });
  for (const r of routes) {
    const m = path.match(r.re);
    if (m) {
      const params = {};
      r.keys.forEach((k, i) => params[k] = decodeURIComponent(m[i+1]));
      return { path, params, query: q, h: r.h };
    }
  }
  return { path, params:{}, query:{}, h: () => `<div class="empty"><div class="emoji">🔍</div><h2>Página no encontrada</h2><a class="btn" href="#/">Volver</a></div>` };
}
function navigate(p) { location.hash = '#' + p; }

function viewAnalytics() {
  const totalConvs = db.bots.reduce((s,b) => s + (b.conversations||0), 0);
  const totalCompleted = db.bots.reduce((s,b) => s + (b.completed||0), 0);
  // Mini chart - last 14 days fake data
  const days = 14;
  const values = Array.from({length: days}, () => Math.floor(Math.random() * 20) + 5);
  const max = Math.max(...values);
  return shell(`
    <div class="page-head">
      <div><h1>Analytics</h1><div class="sub">Métricas de tus bots</div></div>
    </div>
    <div class="scroll-area">
      <div class="kpi-grid">
        <div class="kpi"><div class="label">Conversaciones (30d)</div><div class="value">${totalConvs.toLocaleString('es')}</div><div class="trend">↗ +24%</div></div>
        <div class="kpi"><div class="label">Tasa completadas</div><div class="value">${totalConvs?Math.round(totalCompleted/totalConvs*100):0}%</div><div class="trend">↗ +5%</div></div>
        <div class="kpi"><div class="label">Tiempo promedio</div><div class="value">2m 14s</div><div class="trend">por conversación</div></div>
        <div class="kpi"><div class="label">Leads capturados</div><div class="value">${Math.floor(totalCompleted*0.6)}</div><div class="trend">↗ +18%</div></div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Conversaciones por día · últimos 14 días</h3></div>
        <div class="card-body">
          <svg viewBox="0 0 700 200" style="width:100%;height:200px">
            ${values.map((v, i) => {
              const x = 30 + (i * (640 / (days - 1)));
              const h = (v / max) * 150;
              const y = 180 - h;
              return `<rect x="${x-12}" y="${y}" width="24" height="${h}" rx="3" fill="url(#bargrad)"/>`;
            }).join('')}
            <defs>
              <linearGradient id="bargrad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#7c3aed"/>
                <stop offset="100%" stop-color="#ec4899"/>
              </linearGradient>
            </defs>
            ${values.map((v, i) => {
              const x = 30 + (i * (640 / (days - 1)));
              const d = new Date(Date.now() - (days-1-i) * 86400000);
              return `<text x="${x}" y="195" font-size="10" fill="#7a82a0" text-anchor="middle">${d.getDate()}</text>`;
            }).join('')}
          </svg>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Top respuestas elegidas</h3></div>
        <div class="card-body">
          <div style="display:flex;flex-direction:column;gap:10px">
            ${[
              ['Conocer productos', 64],
              ['Horarios y ubicación', 38],
              ['Hablar con humano', 21],
              ['Cancelar pedido', 12],
            ].map(([label, pct]) => `
              <div>
                <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                  <span>${esc(label)}</span><b>${pct}%</b>
                </div>
                <div style="height:8px;background:var(--bg-soft);border-radius:4px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:4px"></div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `, 'analytics');
}

function listVariables() {
  if (!currentBot) return [];
  const vars = new Set();
  currentBot.flow.forEach(s => {
    if (s.variable) vars.add(s.variable);
  });
  return [...vars];
}

// ============================================================
// CHAT SIMULATOR
// ============================================================
let chatState = null;

function startChat() {
  chatState = {
    currentStepId: currentBot.flow[0]?.id,
    variables: {},
    waitingFor: null, // null | 'text' | 'buttons'
    history: [],
  };
  const body = $('#chatBody');
  if (body) body.innerHTML = '';
  setTimeout(processStep, 200);
}

function interpolate(s) {
  if (!s) return '';
  return s.replace(/\{\{(\w+)\}\}/g, (m, k) => {
    if (k === 'negocio') return db.settings.businessName;
    return chatState.variables[k] || `{{${k}}}`;
  });
}

function appendMessage(role, content, opts = {}) {
  const body = $('#chatBody');
  if (!body) return;
  if (opts.buttons) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-buttons';
    opts.buttons.forEach((b, i) => {
      const btn = document.createElement('button');
      btn.className = 'msg-btn';
      btn.textContent = b.label;
      btn.dataset.idx = i;
      btn.type = 'button';
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
    wrap.querySelectorAll('.msg-btn').forEach(b => b.addEventListener('click', () => {
      const idx = parseInt(b.dataset.idx);
      wrap.querySelectorAll('button').forEach(x => x.disabled = true);
      b.style.background = 'var(--accent)';
      b.style.color = 'white';
      handleButtonChoice(idx);
    }));
  } else {
    const m = document.createElement('div');
    m.className = 'msg ' + role;
    m.textContent = content;
    body.appendChild(m);
  }
  body.scrollTop = body.scrollHeight;
}

function appendTyping() {
  const body = $('#chatBody');
  if (!body) return null;
  const m = document.createElement('div');
  m.className = 'msg bot';
  m.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
  body.appendChild(m);
  body.scrollTop = body.scrollHeight;
  return m;
}

async function processStep() {
  if (!chatState || !chatState.currentStepId) return;
  const step = stepInBot(currentBot, chatState.currentStepId);
  if (!step) {
    appendMessage('system', 'Flujo terminado (paso no encontrado).');
    return;
  }

  if (step.type === 'end') {
    if (step.content) {
      const typing = appendTyping();
      await new Promise(r => setTimeout(r, 600));
      typing?.remove();
      appendMessage('bot', interpolate(step.content));
    }
    appendMessage('system', '✓ Conversación finalizada');
    chatState.waitingFor = null;
    return;
  }

  if (step.type === 'message') {
    const typing = appendTyping();
    await new Promise(r => setTimeout(r, 500 + Math.min(step.content?.length || 0, 50) * 10));
    typing?.remove();
    appendMessage('bot', interpolate(step.content || ''));
    chatState.currentStepId = step.next;
    setTimeout(processStep, 300);
    return;
  }

  if (step.type === 'question') {
    const typing = appendTyping();
    await new Promise(r => setTimeout(r, 500));
    typing?.remove();
    appendMessage('bot', interpolate(step.content || ''));
    chatState.waitingFor = 'text';
    chatState._currentStep = step;
    return;
  }

  if (step.type === 'buttons') {
    const typing = appendTyping();
    await new Promise(r => setTimeout(r, 500));
    typing?.remove();
    appendMessage('bot', interpolate(step.content || ''));
    appendMessage('bot', null, { buttons: step.options || [] });
    chatState.waitingFor = 'buttons';
    chatState._currentStep = step;
    return;
  }

  if (step.type === 'ai') {
    const typing = appendTyping();
    const ctxMsg = `Contexto de la conversación hasta ahora:\n${Object.entries(chatState.variables).map(([k,v]) => `- ${k}: ${v}`).join('\n') || '(sin datos aún)'}\n\nUsuario está esperando respuesta.${step.content ? ' Instrucción específica: ' + interpolate(step.content) : ''}`;
    const messages = chatState.history.length ? chatState.history : [{ role:'user', content: ctxMsg }];
    const res = await aiChat(messages, step.systemPrompt || db.integrations?.ai?.systemPrompt);
    typing?.remove();
    appendMessage('bot', res.reply || '(sin respuesta)');
    if (step.variable && res.reply) chatState.variables[step.variable] = res.reply;
    chatState.history.push({ role:'assistant', content: res.reply || '' });
    chatState.currentStepId = step.next;
    setTimeout(processStep, 400);
    return;
  }

  if (step.type === 'action') {
    appendMessage('system', `⚡ Acción ejecutada: ${step.actionType} → ${interpolate(step.content || '')}`);
    chatState.currentStepId = step.next;
    setTimeout(processStep, 400);
    return;
  }

  if (step.type === 'delay') {
    appendMessage('system', `⏱ Esperando ${step.delay||1}s...`);
    await new Promise(r => setTimeout(r, (step.delay||1) * 1000));
    chatState.currentStepId = step.next;
    setTimeout(processStep, 100);
    return;
  }

  // Default: move on
  chatState.currentStepId = step.next;
  setTimeout(processStep, 100);
}

function handleUserText(text) {
  if (!chatState || chatState.waitingFor !== 'text') return;
  const step = chatState._currentStep;
  // basic validate
  if (step.validate === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text)) {
    appendMessage('user', text);
    appendMessage('bot', '⚠ El email no parece válido. Intenta de nuevo.');
    return;
  }
  appendMessage('user', text);
  if (step.variable) chatState.variables[step.variable] = text;
  chatState.waitingFor = null;
  chatState.currentStepId = step.next;
  setTimeout(processStep, 400);
}

function handleButtonChoice(idx) {
  if (!chatState || chatState.waitingFor !== 'buttons') return;
  const step = chatState._currentStep;
  const opt = step.options[idx];
  appendMessage('user', opt.label);
  if (step.variable) chatState.variables[step.variable] = opt.label;
  chatState.waitingFor = null;
  chatState.currentStepId = opt.next;
  setTimeout(processStep, 400);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  try {
    cur = parseHash();
    const app = $('#app');
    const content = cur.h(cur.params, cur.query) || '';
    app.innerHTML = content;
    wireHandlers();
    if (cur.path.startsWith('/bot/')) {
      updateVars();
      if (sideTab === 'preview') startChat();
    }
  } catch (e) {
    console.error(e);
    $('#app').innerHTML = `<div class="empty"><div class="emoji">⚠️</div><h2>Algo falló</h2><p>${esc(e.message)}</p><button class="btn danger" onclick="localStorage.clear();location.hash='';location.reload()">Resetear</button></div>`;
  }
}

function updateVars() {
  const el = $('#varsList');
  if (!el) return;
  const vars = listVariables();
  if (vars.length === 0) {
    el.innerHTML = '<span style="color:var(--text-l)">Ninguna aún</span>';
  } else {
    el.innerHTML = vars.map(v => `<div style="margin-bottom:4px;font-family:ui-monospace,monospace;font-size:11px;color:var(--accent)">{{${esc(v)}}}</div>`).join('');
  }
}

function wireHandlers() {
  // Generic link rows
  $$('[data-link]').forEach(el => el.addEventListener('click', e => {
    if (e.target.closest('a, button')) return;
    location.hash = el.dataset.link;
  }));

  // Template clicks
  $$('[data-template]').forEach(el => el.addEventListener('click', () => {
    const tpl = templates().find(t => t.id === el.dataset.template);
    if (!tpl) return;
    const newBot = {
      id: uid(),
      name: tpl.name,
      emoji: tpl.emoji,
      color: tpl.color,
      welcomeMsg: tpl.welcomeMsg,
      flow: JSON.parse(JSON.stringify(tpl.flow)),
      channel: 'web',
      active: false,
      createdAt: Date.now(),
      conversations: 0,
      completed: 0,
    };
    db.bots.unshift(newBot);
    saveDB();
    toast('Bot creado desde plantilla');
    navigate('/bot/' + newBot.id);
  }));

  // Editor: node clicks
  $$('[data-step]').forEach(n => n.addEventListener('click', e => {
    if (e.target.closest('[data-del-step], button')) return;
    selectedStepId = n.dataset.step;
    sideTab = 'inspector';
    refreshEditor();
  }));

  // Editor: delete step
  $$('[data-del-step]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const id = b.dataset.delStep;
    if (currentBot.flow.length <= 1) { toast('No puedes eliminar el último paso'); return; }
    if (confirm('¿Eliminar este paso? Las referencias se romperán.')) {
      currentBot.flow = currentBot.flow.filter(s => s.id !== id);
      // also fix next references that point to it
      currentBot.flow.forEach(s => {
        if (s.next === id) s.next = currentBot.flow[currentBot.flow.length - 1]?.id;
        if (s.options) s.options.forEach(o => { if (o.next === id) o.next = currentBot.flow[currentBot.flow.length - 1]?.id; });
      });
      if (selectedStepId === id) selectedStepId = null;
      saveDB();
      refreshEditor();
    }
  }));

  // Bot name input
  const bn = $('#botNameInput');
  if (bn) bn.addEventListener('input', e => {
    currentBot.name = e.target.value;
    $('#botNameDisplay').textContent = e.target.value;
    saveDB();
  });
  $('#activeToggle')?.addEventListener('change', e => {
    currentBot.active = e.target.checked;
    saveDB();
    refreshEditor();
  });

  // Side tabs
  $$('.side-tab').forEach(t => t.addEventListener('click', () => {
    sideTab = t.dataset.tab;
    refreshSide();
  }));

  // Chat
  $('#chatSend')?.addEventListener('click', sendChatMsg);
  $('#chatInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChatMsg();
  });

  // Inspector form changes
  $('#stepType')?.addEventListener('change', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) {
      step.type = e.target.value;
      // Reset some fields based on type
      if (step.type === 'buttons' && !step.options) step.options = [{ label:'Opción 1', next:currentBot.flow[0]?.id }];
      saveDB();
      refreshEditor();
    }
  });
  $('#stepContent')?.addEventListener('input', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.content = e.target.value; saveDB(); refreshCanvas(); }
  });
  $('#stepVariable')?.addEventListener('input', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.variable = e.target.value; saveDB(); refreshCanvas(); updateVars(); }
  });
  $('#stepValidate')?.addEventListener('change', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.validate = e.target.value; saveDB(); }
  });
  $('#stepActionType')?.addEventListener('change', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.actionType = e.target.value; saveDB(); refreshCanvas(); }
  });
  $('#stepDelay')?.addEventListener('input', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.delay = parseFloat(e.target.value) || 1; saveDB(); }
  });
  $('#stepNext')?.addEventListener('change', e => {
    const step = stepInBot(currentBot, selectedStepId);
    if (step) { step.next = e.target.value; saveDB(); refreshCanvas(); }
  });

  // Buttons options editing
  $$('[data-opt-label]').forEach(inp => inp.addEventListener('input', e => {
    const step = stepInBot(currentBot, selectedStepId);
    const i = parseInt(e.target.dataset.optLabel);
    if (step?.options[i]) { step.options[i].label = e.target.value; saveDB(); refreshCanvas(); }
  }));
  $$('[data-opt-next]').forEach(sel => sel.addEventListener('change', e => {
    const step = stepInBot(currentBot, selectedStepId);
    const i = parseInt(e.target.dataset.optNext);
    if (step?.options[i]) { step.options[i].next = e.target.value; saveDB(); refreshCanvas(); }
  }));
  $$('[data-opt-rm]').forEach(b => b.addEventListener('click', () => {
    const step = stepInBot(currentBot, selectedStepId);
    const i = parseInt(b.dataset.optRm);
    if (step?.options) { step.options.splice(i, 1); saveDB(); refreshSide(); refreshCanvas(); }
  }));

  // Settings form
  $('#settingsForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    Object.assign(db.settings, Object.fromEntries(fd));
    saveDB(); toast('Guardado'); render();
  });

  // Global actions
  document.addEventListener('click', globalActions);
}

function sendChatMsg() {
  const inp = $('#chatInput');
  if (!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  handleUserText(text);
}

function refreshCanvas() {
  const c = $('#canvas');
  if (c) c.innerHTML = renderFlow();
  // re-wire
  $$('[data-step]').forEach(n => n.addEventListener('click', e => {
    if (e.target.closest('[data-del-step], button')) return;
    selectedStepId = n.dataset.step;
    sideTab = 'inspector';
    refreshEditor();
  }));
  $$('[data-del-step]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const id = b.dataset.delStep;
    if (currentBot.flow.length <= 1) { toast('No puedes eliminar el último paso'); return; }
    if (confirm('¿Eliminar este paso?')) {
      currentBot.flow = currentBot.flow.filter(s => s.id !== id);
      currentBot.flow.forEach(s => {
        if (s.next === id) s.next = currentBot.flow.at(-1)?.id;
        if (s.options) s.options.forEach(o => { if (o.next === id) o.next = currentBot.flow.at(-1)?.id; });
      });
      if (selectedStepId === id) selectedStepId = null;
      saveDB();
      refreshEditor();
    }
  }));
}

function refreshSide() {
  const c = $('#sideContent');
  if (!c) return;
  c.innerHTML = sideTab === 'preview' ? renderPreviewPanel() : renderInspector();
  $$('.side-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === sideTab));
  wireHandlers();
  if (sideTab === 'preview') startChat();
}

function refreshEditor() {
  refreshCanvas();
  refreshSide();
  updateVars();
}

async function globalActions(e) {
  const a = e.target.closest('[data-act]');
  if (!a) return;
  e.stopPropagation();
  const act = a.dataset.act;

  if (act === 'new-bot') {
    // Open from templates
    navigate('/plantillas');
  }
  else if (act === 'add-step-modal') {
    addStepModal();
  }
  else if (act === 'add-option') {
    const step = stepInBot(currentBot, selectedStepId);
    if (step && step.type === 'buttons') {
      if (!step.options) step.options = [];
      step.options.push({ label:'Nueva opción', next: currentBot.flow.at(-1)?.id });
      saveDB();
      refreshSide();
      refreshCanvas();
    }
  }
  else if (act === 'test-now') {
    sideTab = 'preview';
    refreshSide();
  }
  else if (act === 'restart-preview') {
    startChat();
  }
  else if (act === 'duplicate-bot') {
    const cpy = JSON.parse(JSON.stringify(currentBot));
    cpy.id = uid();
    cpy.name = currentBot.name + ' (copia)';
    cpy.active = false;
    cpy.conversations = 0;
    cpy.completed = 0;
    cpy.createdAt = Date.now();
    db.bots.unshift(cpy);
    saveDB(); navigate('/bot/' + cpy.id);
    toast('Bot duplicado');
  }
  else if (act === 'delete-bot') {
    if (confirm('¿Eliminar este bot? No se puede deshacer.')) {
      db.bots = db.bots.filter(b => b.id !== currentBot.id);
      saveDB(); navigate('/'); toast('Bot eliminado');
    }
  }
  else if (act === 'reset-flow') {
    if (confirm('¿Reiniciar el flujo a un solo paso?')) {
      currentBot.flow = [
        { id:'s1', type:'message', content:'¡Hola!', next:'end' },
        { id:'end', type:'end' },
      ];
      selectedStepId = null;
      saveDB(); refreshEditor();
    }
  }
  else if (act === 'reset-all') {
    if (confirm('¿Borrar TODO y reiniciar?')) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  }
}

function addStepModal() {
  const m = $('#modal');
  $('#modalCard').innerHTML = `
    <div class="modal-head">
      <h2>Agregar paso</h2>
      <button type="button" class="btn ghost sm" data-mc="cancel">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${Object.entries(STEP_TYPES).filter(([k]) => k !== 'condition').map(([k, v]) => `
          <button type="button" data-add-type="${k}" style="background:var(--bg-card-2);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;text-align:left;color:var(--text);transition:border-color .15s">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
              <div style="width:32px;height:32px;border-radius:8px;background:${v.color};display:flex;align-items:center;justify-content:center;font-size:16px">${v.icon}</div>
              <b>${v.label}</b>
            </div>
            <div style="font-size:12px;color:var(--text-m)">${v.desc}</div>
          </button>`).join('')}
      </div>
    </div>`;
  m.classList.add('open');
  m.onclick = e => { if (e.target.dataset.mc === 'cancel' || e.target === m) m.classList.remove('open'); };
  $$('[data-add-type]', m).forEach(b => b.addEventListener('mouseover', () => b.style.borderColor = 'var(--accent)'));
  $$('[data-add-type]', m).forEach(b => b.addEventListener('mouseout', () => b.style.borderColor = 'var(--border)'));
  $$('[data-add-type]', m).forEach(b => b.addEventListener('click', () => {
    const type = b.dataset.addType;
    addStep(type);
    m.classList.remove('open');
  }));
}

function addStep(type) {
  if (!currentBot) return;
  const newId = 's' + (currentBot.flow.length + 1) + uid().slice(0,2);
  const endStep = currentBot.flow.find(s => s.type === 'end');
  // Insert before end
  const insertIdx = endStep ? currentBot.flow.indexOf(endStep) : currentBot.flow.length;
  const prevStep = currentBot.flow[insertIdx - 1];
  const newStep = {
    id: newId,
    type,
    content: type === 'message' ? '' : type === 'question' ? '¿Cuál es tu...?' : type === 'buttons' ? 'Elige una opción:' : '',
    next: endStep?.id,
  };
  if (type === 'buttons') newStep.options = [
    { label:'Opción 1', next: endStep?.id },
    { label:'Opción 2', next: endStep?.id },
  ];
  if (type === 'question') newStep.variable = '';
  if (type === 'action') newStep.actionType = 'email';
  if (type === 'delay') newStep.delay = 1;
  currentBot.flow.splice(insertIdx, 0, newStep);
  // wire previous step to new one
  if (prevStep && prevStep.next === endStep?.id) prevStep.next = newId;
  saveDB();
  selectedStepId = newId;
  sideTab = 'inspector';
  refreshEditor();
  toast('Paso agregado');
}

// === Integrations form handlers (delegated) ===

  const form = e.target;

    e.preventDefault();
    const fd = new FormData(form);

      provider: fd.get('provider'),
      model: fd.get('model'),
      systemPrompt: fd.get('systemPrompt'),
    };
    const k = fd.get('apiKey');
    if (k) payload.apiKey = k;
    if (useAPI) {
      try {
        const r = await fetch(api('/api/integrations/ai'), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await r.json();
        db.integrations.ai = { ...db.integrations.ai, ...data };
        saveDB(); render(); toast('IA guardada');
      } catch { toast('Error guardando'); }

      Object.assign(db.integrations.ai, payload);

    const t = fd.get('accessToken');
    if (t) payload.accessToken = t;
    if (useAPI) {
      try {
        const r = await fetch(api('/api/integrations/messenger'), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await r.json();
        db.integrations.messenger = { ...db.integrations.messenger, ...data };
        saveDB(); render(); toast('Messenger guardado');
      } catch { toast('Error'); }
    } else {
      Object.assign(db.integrations.messenger, payload);
      if (t) db.integrations.messenger.hasToken = true;
      saveDB(); render(); toast('Guardado (modo local)');
    }
  }
  if (form.id === 'igForm') {
    e.preventDefault();
    const fd = new FormData(form);
    const payload = { accountId: fd.get('accountId'), username: fd.get('username') };
    const t = fd.get('accessToken');
    if (t) payload.accessToken = t;
    if (useAPI) {
      try {
        const r = await fetch(api('/api/integrations/instagram'), { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await r.json();
        db.integrations.instagram = { ...db.integrations.instagram, ...data };
        saveDB(); render(); toast('Instagram guardado');
      } catch { toast('Error'); }
    } else {
      Object.assign(db.integrations.instagram, payload);
      if (t) db.integrations.instagram.hasToken = true;
      saveDB(); render(); toast('Guardado (modo local)');
    }
  }
});

document.addEventListener('click', async e => {
  const a = e.target.closest('[data-act]');
  if (!a) return;
  const act = a.dataset.act;
  if (act === 'clear-ai-key') {
    if (confirm('¿Borrar la API key de IA?')) {
      if (useAPI) await fetch(api('/api/integrations/ai/key'), { method:'DELETE' });
      db.integrations.ai.hasKey = false;
      saveDB(); render(); toast('Key borrada');
    }
  }
  else if (act === 'clear-wa-token') {
    if (confirm('¿Borrar el token de WhatsApp?')) {
      if (useAPI) await fetch(api('/api/integrations/whatsapp/token'), { method:'DELETE' });
      db.integrations.whatsapp.hasToken = false;
      saveDB(); render(); toast('Token borrado');
    }
  }
  else if (act === 'copy-webhook') {
    navigator.clipboard?.writeText(location.origin + '/api/whatsapp/webhook');
    toast('Webhook copiado');
  }
  else if (act === 'copy-webhook-msg') {
    navigator.clipboard?.writeText(location.origin + '/api/messenger/webhook');
    toast('Webhook copiado');
  }
  else if (act === 'copy-webhook-ig') {
    navigator.clipboard?.writeText(location.origin + '/api/instagram/webhook');
    toast('Webhook copiado');
  }
  else if (act === 'clear-msg-token') {
    if (confirm('¿Borrar el token de Messenger?')) {
      if (useAPI) await fetch(api('/api/integrations/messenger/token'), { method:'DELETE' });
      db.integrations.messenger.hasToken = false;
      saveDB(); render(); toast('Token borrado');
    }
  }
  else if (act === 'clear-ig-token') {
    if (confirm('¿Borrar el token de Instagram?')) {
      if (useAPI) await fetch(api('/api/integrations/instagram/token'), { method:'DELETE' });
      db.integrations.instagram.hasToken = false;
      saveDB(); render(); toast('Token borrado');
    }
  }
  else if (act === 'save-api-url') {
    const v = $('#apiUrlInput').value.trim().replace(/\/+$/, '');
    if (v) localStorage.setItem('nexa.apiUrl', v);
    else localStorage.removeItem('nexa.apiUrl');
    toast('URL guardada — recargando...');
    setTimeout(() => location.reload(), 600);
  }
  else if (act === 'clear-api-url') {
    localStorage.removeItem('nexa.apiUrl');
    toast('URL eliminada — recargando...');
    setTimeout(() => location.reload(), 600);
  }
  else if (act === 'test-api') {
    const v = $('#apiUrlInput').value.trim().replace(/\/+$/, '') || apiBase;
    try {
      const r = await fetch((v || '') + '/api/state');
      if (r.ok) toast('✓ Backend responde correctamente');
      else toast('✗ Backend no responde (status ' + r.status + ')');
    } catch (e) { toast('✗ No pude conectar: ' + e.message); }
  }
});

window.addEventListener('hashchange', render);

// Async init
(async () => {
  db = await loadDB();
  render();
})();
})();
</script>
